<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modern Timer App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- Google AdSense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9196190484838843" crossorigin="anonymous"></script>
</head>
<body class="dark-theme">
  <div class="app-container">
    <header>
      <div class="logo">
        <i data-lucide="clock"></i>
        <span>TimeKeeper</span>
      </div>
      <nav>
        <button class="nav-btn active" data-view="clock" title="현재 시각">
          <i data-lucide="watch"></i>
        </button>
        <button class="nav-btn" data-view="timer" title="타이머">
          <i data-lucide="timer"></i>
        </button>
        <button class="nav-btn" data-view="stopwatch" title="스톱워치">
          <i data-lucide="hourglass"></i>
        </button>
        <button class="nav-btn" data-view="affiliate" title="제휴 문의">
          <i data-lucide="handshake"></i>
        </button>
      </nav>
      <button id="theme-toggle" class="icon-btn" title="테마 전환">
        <i data-lucide="moon" id="theme-icon"></i>
      </button>
    </header>

    <main>
      <!-- Clock View -->
      <section id="clock-view" class="view active">
        <div class="display-card">
          <div class="date-display" id="current-date">----년 --월 --일 ---요일</div>
          <div class="time-display" id="current-time">00:00:00</div>
        </div>
      </section>

      <!-- Timer View -->
      <section id="timer-view" class="view">
        <div class="display-card">
          <div class="timer-controls">
            <div class="input-group">
              <input type="number" id="timer-min" placeholder="00" min="0" max="59">
              <span>:</span>
              <input type="number" id="timer-sec" placeholder="00" min="0" max="59">
            </div>
            <div class="timer-display" id="timer-display">00:00</div>
            <div class="action-buttons">
              <button id="timer-start" class="btn primary"><i data-lucide="play"></i> 시작</button>
              <button id="timer-pause" class="btn secondary hidden"><i data-lucide="pause"></i> 일시정지</button>
              <button id="timer-reset" class="btn outline"><i data-lucide="rotate-ccw"></i> 초기화</button>
            </div>
          </div>
        </div>
      </section>

      <!-- Stopwatch View -->
      <section id="stopwatch-view" class="view">
        <div class="display-card">
          <div class="stopwatch-display" id="stopwatch-display">00:00.00</div>
          <div class="action-buttons">
            <button id="sw-start" class="btn primary"><i data-lucide="play"></i> 시작</button>
            <button id="sw-pause" class="btn secondary hidden"><i data-lucide="pause"></i> 일시정지</button>
            <button id="sw-lap" class="btn secondary hidden"><i data-lucide="flag"></i> 랩</button>
            <button id="sw-reset" class="btn outline"><i data-lucide="rotate-ccw"></i> 초기화</button>
          </div>
          <div class="lap-container">
            <ul id="lap-list"></ul>
          </div>
        </div>
      </section>

      <!-- Affiliate View -->
      <section id="affiliate-view" class="view">
        <div class="display-card">
          <h2 class="view-title">제휴 문의</h2>
          <form action="https://formspree.io/f/xaqvnweb" method="POST" class="contact-form">
            <div class="form-group">
              <label for="name">성함</label>
              <input type="text" id="name" name="name" placeholder="홍길동" required>
            </div>
            <div class="form-group">
              <label for="email">이메일</label>
              <input type="email" id="email" name="_replyto" placeholder="example@email.com" required>
            </div>
            <div class="form-group">
              <label for="message">문의 내용</label>
              <textarea id="message" name="message" rows="4" placeholder="제휴 관련 내용을 입력해주세요." required></textarea>
            </div>
            <button type="submit" class="btn primary full-width">
              <i data-lucide="send"></i> 문의하기
            </button>
          </form>
        </div>
      </section>
    </main>

    <section class="comments-section">
      <div class="display-card">
        <h3 class="section-subtitle">Comments</h3>
        <div id="disqus_thread"></div>
      </div>
    </section>

    <footer>
      <p>&copy; 2026 Modern Timer App - Built with Gemini CLI</p>
    </footer>
  </div>

  <script src="main.js" type="module"></script>
  <script>
    // Initialize Lucide icons
    lucide.createIcons();

    /**

    };

    (d.head || d.body).appendChild(s);
    })();
  </script>
</body>
</html>
